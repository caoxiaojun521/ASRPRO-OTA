esphome:
  name: esp32c3mini
  friendly_name: esp32c3mini
  platformio_options:
    board_build.flash_mode: dio

  on_boot:
    priority: -100
    then:
      - lambda: |-
          #include <WiFi.h>
          #include <HardwareSerial.h>
          #include <vector>
          
          static const uint8_t FRAME1[] = {0xA5, 0x0F, 0x00, 0x00, 0xA0, 0x05, 0x01, 0x48, 0x52, 0xFF};
          static const size_t FRAME1_LEN = sizeof(FRAME1);
          static const uint32_t FRAME1_BAUD_1 = 115200;
          static const uint32_t FRAME1_BAUD_2 = 1500000;
          
          static const uint8_t FRAME2[] = {0xA5, 0x0F, 0x00, 0x00, 0xA0, 0x85, 0x01, 0xD0, 0x49, 0xFF};
          static const size_t FRAME2_LEN = sizeof(FRAME2);
          static const uint32_t FRAME2_BAUD = 750000;
          
          struct ClientState {
            WiFiClient client;
            uint8_t match_frame1 = 0;
            uint8_t match_frame2 = 0;
            uint32_t frame1_count = 0;
            uint32_t frame2_count = 0;
            
            ClientState(WiFiClient c) : client(c) {}
          };
          
          static WiFiServer tcp_server(8282);  
          static std::vector<ClientState> client_states;
          static bool is_switching_baud = false;
          static std::vector<uint8_t> pending_frame;
          static uint32_t pending_baud_rate = 0;
          
          class UARTTCPBridge : public Component {
          private:
            HardwareSerial* uart_hw_ = nullptr;
            
            void perform_baud_switch(uint32_t new_baud) {
              is_switching_baud = true;
              
              id(uart_component).flush();
              
              while (id(uart_component).available()) {
                uint8_t dummy;
                id(uart_component).read_byte(&dummy);
              }
              
              if (uart_hw_) {
                uart_hw_->updateBaudRate(new_baud);
                ESP_LOGI("BAUD_SWITCH", "UART波特率已切换到: %d", new_baud);
              } else {
                ESP_LOGE("BAUD_SWITCH", "无法切换波特率!");
              }
              
              is_switching_baud = false;
            }
            
          public:
            void setup() override {
              tcp_server.begin();
              tcp_server.setNoDelay(true);
              ESP_LOGI("TCP", "TCP服务器启动,端口: %d", 8282);
              
              uart_hw_ = id(uart_component).get_hw_serial();
              if (!uart_hw_) {
                ESP_LOGE("UART", "无法获取硬件UART引用!");
              }
            }
            
            void loop() override {
              WiFiClient new_client = tcp_server.accept();
              if (new_client) {
                ESP_LOGI("TCP", "新客户端连接,IP: %s", new_client.remoteIP().toString().c_str());
                client_states.push_back(ClientState(new_client));
              }
              
              for (auto it = client_states.begin(); it != client_states.end(); ) {
                if (!it->client.connected()) {
                  ESP_LOGI("TCP", "客户端断开,IP: %s", it->client.remoteIP().toString().c_str());
                  it = client_states.erase(it);
                } else {
                  ++it;
                }
              }
              
              // TCP → UART:转发TCP客户端数据到UART
              for (auto& cs : client_states) {
                while (cs.client.available()) {
                  uint8_t tcp_data;
                  cs.client.readBytes(&tcp_data, 1);
                  
                  if (tcp_data == FRAME1[cs.match_frame1]) {
                    cs.match_frame1++;
                    
                    if (cs.match_frame1 == FRAME1_LEN) {
                      cs.match_frame1 = 0;
                      cs.frame1_count++;
                      ESP_LOGI("FRAME1", "检测到帧1 #%d", cs.frame1_count);
                      
                      uint32_t new_baud = (cs.frame1_count == 1) ? FRAME1_BAUD_1 : FRAME1_BAUD_2;
                      
                      pending_frame.assign(FRAME1, FRAME1 + FRAME1_LEN);
                      pending_baud_rate = new_baud;
                    }
                  } else {
                    cs.match_frame1 = 0;
                  }
                  
                  if (tcp_data == FRAME2[cs.match_frame2]) {
                    cs.match_frame2++;
                    
                    if (cs.match_frame2 == FRAME2_LEN) {
                      cs.match_frame2 = 0;
                      cs.frame2_count++;
                      ESP_LOGI("FRAME2", "检测到帧2 #%d", cs.frame2_count);
                      
                      if (cs.frame2_count == 2) {
                        pending_frame.assign(FRAME2, FRAME2 + FRAME2_LEN);
                        pending_baud_rate = FRAME2_BAUD;
                      }
                    }
                  } else {
                    cs.match_frame2 = 0;
                  }
                  
                  id(uart_component).write_byte(tcp_data);
                }
              }
              
              if (!pending_frame.empty() && !is_switching_baud) {
                perform_baud_switch(pending_baud_rate);
                
                id(uart_component).write_array(pending_frame.data(), pending_frame.size());
                ESP_LOGI("FRAME_SEND", "已在新波特率(%d)下发送帧", pending_baud_rate);
                
                pending_frame.clear();
              }
              
              while (id(uart_component).available()) {
                uint8_t uart_data;
                id(uart_component).read_byte(&uart_data);
                for (auto& cs : client_states) {
                  if (cs.client.connected()) {
                    cs.client.write(uart_data);
                  }
                }
              }
            }
          };
          
          App.register_component(new UARTTCPBridge());

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: arduino

wifi:
  power_save_mode: NONE
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "asrpro"
    password: "1234567890"

  output_power: 12dB


logger:


api:
  encryption:
    key: "修改成自己的"

ota:
  - platform: esphome
    password: "修改成自己的"


captive_portal:

uart:
  id: uart_component
  baud_rate: 115200
  tx_pin: GPIO21
  rx_pin: GPIO20
  rx_buffer_size: 2048
  data_bits: 8
  parity: NONE
  stop_bits: 1



switch:
  - platform: restart
    name: "Restart"
  - platform: gpio
    id: gpio14_switch
    name: "asrpro启动开关"
    pin: GPIO2
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      then:
        - logger.log: "asrpro开启"
    on_turn_off:
      then:
        - logger.log: "asrpro关闭"

